version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
        - npx prisma generate
    build:
      commands:
        - env | grep -E '^(DATABASE_URL|NEXTAUTH_SECRET|NEXTAUTH_URL|NEXT_PUBLIC_SUPABASE_URL|NEXT_PUBLIC_SUPABASE_ANON_KEY|SUPABASE_SERVICE_ROLE_KEY|SEED_ADMIN_PASSWORD|NEW_RELIC_APP_NAME|NEW_RELIC_LICENSE_KEY)=' > .env.production
        - npm run build
        - cp .env.production .next/.env.production
        - cp newrelic.js .next/newrelic.js
        - find node_modules/@swc -mindepth 1 -maxdepth 1 ! -name helpers -exec rm -rf {} +
        - rm -rf node_modules/@esbuild
        - rm -rf node_modules/next/next-swc-fallback
        - rm -rf node_modules/typescript
        - rm -rf node_modules/prettier
        - rm -rf node_modules/@vitest
        - rm -rf node_modules/vitest
        - rm -rf node_modules/@types
        - rm -rf node_modules/eslint*
        - rm -rf node_modules/@eslint*
        - rm -rf node_modules/@tailwindcss
        - rm -rf node_modules/tailwindcss
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
